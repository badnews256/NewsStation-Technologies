<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NewsOS Home</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>



<div id="boot-screen">

    <h1>NEWS STATION TECHNOLOGIES</h1>

    <h2>NSTV One</h2>

    <p>Powered by NewsOS</p>

    <div id="boot-text">
        Initializing Hardware...
    </div>

   <div id="boot-bar">

    <div id="boot-progress"></div>

</div>

</div>   <!-- closes boot-screen -->

<div id="standby-screen">

    <div id="standby-led"></div>

    <div id="standby-text">
        Standby
    </div>

</div>



<div id="desktop">

<div id="header">

<h1>NEWS STATION TECHNOLOGIES</h1>

<h2>NSTV One</h2>

<p>Powered by NewsOS</p>

</div>

<div id="dashboard">

<div class="tile" onclick="openApp('livetv')">
    📺<br>LIVE TV
</div>

<div class="tile" onclick="openApp('media')">
    🎵<br>MEDIA
</div>

<div class="tile" onclick="openApp('news')">
    📰<br>NEWS
</div>

<div class="tile" onclick="openApp('events')">
    📅<br>EVENTS
</div>

<div class="tile" onclick="openApp('browser')">
    🌐<br>BROWSER
</div>

<div class="tile" onclick="openApp('settings')">
    ⚙️<br>SETTINGS
</div>

</div>

<div id="status">

<div id="online">
🟢 ONLINE
</div>

<div id="datetime">
Loading...
</div>

</div>

<div id="ticker-container">
    <div id="ticker">
        Loading News...
    </div>
</div>
</div>
<!-- ==========================
     NewsOS Application Window
=========================== -->

<div id="app-window">

    <div id="app-header">

        <span id="app-title">
            Application
        </span>

        <button id="close-app" onclick="closeApp()">
            ✕
        </button>

    </div>

    <div id="app-content">

    </div>

</div>
<script src="js/config.js"></script>
<script src="js/apps.js"></script>
<script src="js/power.js"></script>
<script src="js/app.js"></script>
</body>
</html>
